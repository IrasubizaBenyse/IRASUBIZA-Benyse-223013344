<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Royal Hotel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#0b1d3a;
  color:white;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero{
  height:50vh;
  background:url('https://images.unsplash.com/photo-1521790797524-b2497295b8a0') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero-content{
  position:relative;
  color:white;
  text-align:center;
}

/* FORM */
.container{
  padding:40px;
  display:flex;
  justify-content:center;
}

form{
  background:white;
  padding:30px;
  border-radius:10px;
  width:400px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

form input, form textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:12px;
  background:#ff5a5f;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

button:hover{
  background:#e04848;
}

/* FOOTER */
footer{
  background:#0b1d3a;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <h1>Royal Hotel</h1>
  <nav>
    <a href="/project3.html">Home</a>
    <a href="/about_us.html">About</a>
    <a href="/menu.html">Menu</a>
    <a href="/order.html">Order</a>
    <a href="/gallery.html">Gallery</a>
    <a href="/contact.html">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Contact Us</h1>
    <p>We would love to hear from you</p>
  </div>
</section>

<!-- FORM -->
<div class="container">
<form method="POST">

  <input type="text" name="fullname" placeholder="Full Name" required>

  <input type="email" name="email" placeholder="Email" required>

  <input type="text" name="phone" placeholder="Phone" required>

  <input type="text" name="location" placeholder="Location" required>

  <textarea name="message" placeholder="Your Message" required></textarea>

  <button type="submit" name="send">Send Message</button>

</form>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Royal Hotel | All Rights Reserved</p>
</footer>

</body>
</html>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#0b1d3a;
  color:white;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero{
  height:50vh;
  background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero-content{
  position:relative;
  color:white;
  text-align:center;
}

/* GALLERY */
.container{
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.grid a{
  display:block;
  overflow:hidden;
  border-radius:10px;
}

.grid img{
  width:100%;
  height:200px;
  object-fit:cover;
  transition:0.3s;
}

.grid img:hover{
  transform:scale(1.1);
}

/* FOOTER */
footer{
  background:#0b1d3a;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>

</head>
